version: "3.9"

services:
  frontend:
    build: .
    container_name: shopflow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    networks:
      - shopflow-network

networks:
  shopflow-network:
    external: true
    name: shopflow_shopflow-network
